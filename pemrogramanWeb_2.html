<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Registrasi</title>
    </head>
    <body>
        <h1>Pendaftaran Mahasigma Baru</h1>
        <form action="">
            <label for="">Nama Lengkap : </label>
            <input type="text" placeholder="Nama Lengkap Anda">
            <br>
            <label for="">Email Aktif : </label>
            <input type="email" name="" id="" placeholder="Email Aktif">
            <br>
            <label for="">Password : </label>
            <input type="password" name="" id="">
            <br>
            <label for="">Jenis Kelamin: </label>
            <input type="radio" name="kelamin" id="kel_l" value="Laki-laki"><label for="html">Laki-laki</label>
            <input type="radio" name="kelamin" id="kel_p" value="Perempuan"><label for="css">Perempuan</label>
            <br>
            <label for="">Hobi  :</label>
            <input type="checkbox" name="" id=""><label for="">Mancing</label>
            <input type="checkbox" name="" id=""><label for="">Otomotif</label>
            <br>
            <label for="">Tanggal Lahir : </label>
            <input type="date" name="" id="">
            <br>
            <label for="">Alamat Lengkap</label>
            <textarea name="" id=""></textarea>
            <br>
            <input type="file" name="" id="">
            <br><br>
            <input type="submit" value="submit">
            <input type="reset" value="reset">
        </form>
    </body>
</html>
